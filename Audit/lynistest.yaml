---
- name: Perform system audit using Lynis
  hosts: all
  become: yes

  tasks:
    - name: Install tar package if not present
      ansible.builtin.package:
        name: tar
        state: present
    
    - name: Copy Lynis tarball to the remote host
      ansible.builtin.copy:
        src: ./files/lynis-3.1.6.tar.gz
        dest: /usr/local/lynis-3.1.6.tar.gz
        owner: root
        group: root
        mode: '0644'

    - name: Extract Lynis tarball
      ansible.builtin.unarchive:
        src: /usr/local/lynis-3.1.6.tar.gz
        dest: /usr/local/
        remote_src: yes

    - name: Run Lynis audit
      shell: ./lynis audit system --quiet
      args:
        chdir: /usr/local/lynis

    - name: Fetch the lynis log and report
      ansible.builtin.fetch:
        src: "/var/log/{{ item }}"
        dest: "/home/pankaj/{{ inventory_hostname }}-{{ item }}"
        flat: true
      loop:
        - lynis-report.dat
        - lynis.log

